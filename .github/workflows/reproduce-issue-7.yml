name: Verify Fix for Issue 7 - WindowsAttachProvider could not be instantiated

# Root cause of issue #7:
#   ClassLoader.loadLibrary() searches sys_paths (from sun.boot.library.path) FIRST,
#   then usr_paths (from java.library.path).  On JDK 8 Temurin the JVM always sets
#   sun.boot.library.path = jre\bin at startup (overriding any -D flag), so
#   System.loadLibrary("attach") always succeeds via sys_paths.
#
# To isolate the failure we:
#   1. Pass -Djava.library.path=. so usr_paths = ["."] (no jre\bin).
#   2. In modified source: null ClassLoader.sys_paths via reflection and set
#      sun.boot.library.path="." so that the NEXT loadLibrary call re-reads both
#      paths as ".".  This faithfully simulates Oracle JDK 8 or any environment
#      where jre\bin is absent from every search path.
#
# Three jobs:
#   1. layout-probe           – informational, no assertions
#   2. verify-fix             – fix fires fallback, "Loaded attach" appears, no error
#   3. reproduce-without-fix  – no loadAttachLibrary(), same isolation, ServiceConfigurationError
#   4. workaround-sanity-check – no fix, but -Djava.library.path=jre\bin provided explicitly

on:
  workflow_dispatch:
  push:
    branches:
      - claude/reproduce-issue-7-Qj92G

jobs:

  layout-probe:
    runs-on: windows-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin

      - name: Print JDK layout and library paths
        shell: pwsh
        run: |
          Write-Host "JAVA_HOME: $env:JAVA_HOME"
          Write-Host ""
          Write-Host "attach.dll locations:"
          Write-Host "  jre\bin\attach.dll : $(Test-Path "$env:JAVA_HOME\jre\bin\attach.dll")"
          Write-Host "  bin\attach.dll     : $(Test-Path "$env:JAVA_HOME\bin\attach.dll")"
          Write-Host ""
          Write-Host "JVM property settings:"
          java -XshowSettings:property -version 2>&1 | Select-String "library.path"

  verify-fix-windows-attach-dll:
    runs-on: windows-latest
    needs: layout-probe
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11 for build
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: temurin

      - name: Patch — clear sys_paths at start of loadAttachLibrary() to force fallback
        shell: pwsh
        run: |
          # Insert reflection-based sys_paths clearing at the very beginning of
          # loadAttachLibrary().  This nulls ClassLoader.sys_paths and sets
          # sun.boot.library.path="." so the next System.loadLibrary("attach") call
          # re-initialises both search paths from "." (where attach.dll is absent),
          # causing the call to fail and the JAVA_HOME fallback to fire.
          $file = "src\main\java\name\neykov\secrets\AttachHelper.java"
          $content = Get-Content $file -Raw

          $snippet = @'
        // [test patch] Null ClassLoader.sys_paths so the next loadLibrary call
        // re-reads sun.boot.library.path from the property we override to ".".
        // This simulates an environment where jre\bin is absent from all JVM search paths.
        try {
            java.lang.reflect.Field sysp = ClassLoader.class.getDeclaredField("sys_paths");
            sysp.setAccessible(true);
            sysp.set(null, null);
            System.setProperty("sun.boot.library.path", ".");
        } catch (Exception ignored) {}

'@
          # Inject after the opening brace of loadAttachLibrary()
          $patched = $content -replace '(private static void loadAttachLibrary\(\) throws FailureMessageException \{)', "`$1`n$snippet"
          if ($patched -eq $content) {
            Write-Error "Regex did not match — loadAttachLibrary() not found"
            exit 1
          }
          Set-Content $file $patched -NoNewline
          Write-Host "Patched loadAttachLibrary() with sys_paths clearing."

      - name: Build patched jar (skip integration tests)
        run: mvn -B package -DskipTests

      - name: Set up JDK 8 Temurin for attach test
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin

      - name: Verify precondition — attach.dll in jre\bin
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:JAVA_HOME\jre\bin\attach.dll")) {
            Write-Error "Precondition failed: attach.dll not found at $env:JAVA_HOME\jre\bin\attach.dll"
            exit 1
          }
          Write-Host "Precondition met: attach.dll exists at $env:JAVA_HOME\jre\bin\attach.dll"

      - name: Run 'list' with java.library.path=. (usr_paths will also be .)
        shell: pwsh
        run: |
          $jar = Get-Item target\extract-tls-secrets-*.jar | Select-Object -First 1
          Write-Host "Running fixed jar. sys_paths cleared in code; java.library.path=. via -D."
          java "-Djava.library.path=." -jar $jar.FullName list 2>&1 |
            Tee-Object -FilePath output.txt
          Write-Host "Exit code: $LASTEXITCODE"

      - name: Assert fix works — fallback fires, no ServiceConfigurationError
        shell: pwsh
        run: |
          $output = Get-Content output.txt -Raw
          Write-Host "--- output ---"
          Write-Host $output
          Write-Host "--- end ---"

          if ($output -match 'WindowsAttachProvider could not be instantiated') {
            Write-Error "FAIL: ServiceConfigurationError present — fix did not prevent issue #7"
            exit 1
          }
          if ($output -match 'Failed loading attach provider') {
            Write-Error "FAIL: Fix could not load attach.dll via JAVA_HOME fallback"
            exit 1
          }
          if ($output -notmatch 'Loaded attach') {
            Write-Error "FAIL: 'Loaded attach' not in output — fix fallback did not fire (sys_paths clearing may not have worked)"
            exit 1
          }
          Write-Host "PASS: Fix activated — attach.dll loaded via JAVA_HOME/jre/bin fallback."

      - name: Upload output for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fix-verified-output
          path: output.txt

  reproduce-without-fix:
    runs-on: windows-latest
    needs: verify-fix-windows-attach-dll
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11 for build
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: temurin

      - name: Patch — remove loadAttachLibrary() guard AND clear sys_paths in list()
        shell: pwsh
        run: |
          $file = "src\main\java\name\neykov\secrets\AttachHelper.java"
          $content = Get-Content $file -Raw

          # 1. Remove the fix's loadAttachLibrary() call
          $patched = $content -replace '(?s)\s*if \(isWindows\(\)\) \{\s*loadAttachLibrary\(\);\s*\}', ''
          if ($patched -eq $content) {
            Write-Error "Regex 1 did not match — loadAttachLibrary() guard not found"
            exit 1
          }

          # 2. Inject sys_paths clearing at the start of list() so that when
          #    VirtualMachine.list() triggers ServiceLoader to instantiate
          #    WindowsAttachProvider, the static init's loadLibrary("attach") uses
          #    "." for both search paths and fails → ServiceConfigurationError.
          $snippet = @'
        try {
            java.lang.reflect.Field sysp = ClassLoader.class.getDeclaredField("sys_paths");
            sysp.setAccessible(true);
            sysp.set(null, null);
            System.setProperty("sun.boot.library.path", ".");
        } catch (Exception ignored) {}

'@
          $patched = $patched -replace '(private static String list\(\) \{)', "`$1`n$snippet"
          if ($patched -eq $content) {
            Write-Error "Regex 2 did not match — list() method not found"
            exit 1
          }

          Set-Content $file $patched -NoNewline
          Write-Host "Removed loadAttachLibrary() guard and injected sys_paths clearing in list()."

      - name: Build unfixed jar (skip integration tests)
        run: mvn -B package -DskipTests

      - name: Set up JDK 8 Temurin for attach test
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin

      - name: Verify precondition — attach.dll in jre\bin
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:JAVA_HOME\jre\bin\attach.dll")) {
            Write-Error "Precondition failed: attach.dll not found"
            exit 1
          }
          Write-Host "Precondition met."

      - name: Run unfixed 'list' with java.library.path=.
        shell: pwsh
        run: |
          $jar = Get-Item target\extract-tls-secrets-*.jar | Select-Object -First 1
          Write-Host "Running UNFIXED jar. sys_paths cleared in list(); java.library.path=. via -D."
          java "-Djava.library.path=." -jar $jar.FullName list 2>&1 |
            Tee-Object -FilePath output-unfixed.txt
          Write-Host "Exit code: $LASTEXITCODE"

      - name: Assert issue #7 is reproduced
        shell: pwsh
        run: |
          $output = Get-Content output-unfixed.txt -Raw
          Write-Host "--- output ---"
          Write-Host $output
          Write-Host "--- end ---"

          if ($output -match 'WindowsAttachProvider could not be instantiated') {
            Write-Host "PASS: Issue #7 reproduced — ServiceConfigurationError confirmed without the fix."
          } else {
            Write-Error "Expected ServiceConfigurationError was NOT produced. See output above."
            exit 1
          }

      - name: Upload output for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reproduce-unfixed-output
          path: output-unfixed.txt

  workaround-sanity-check:
    # Shows the manual workaround: pass -Djava.library.path=jre\bin explicitly.
    # Uses the same "no fix + sys_paths cleared" setup as reproduce-without-fix,
    # but adds jre\bin to java.library.path so usr_paths finds attach.dll.
    runs-on: windows-latest
    needs: reproduce-without-fix
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11 for build
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: temurin

      - name: Patch — remove loadAttachLibrary() guard AND clear sys_paths in list()
        shell: pwsh
        run: |
          $file = "src\main\java\name\neykov\secrets\AttachHelper.java"
          $content = Get-Content $file -Raw

          $patched = $content -replace '(?s)\s*if \(isWindows\(\)\) \{\s*loadAttachLibrary\(\);\s*\}', ''

          $snippet = @'
        try {
            java.lang.reflect.Field sysp = ClassLoader.class.getDeclaredField("sys_paths");
            sysp.setAccessible(true);
            sysp.set(null, null);
            System.setProperty("sun.boot.library.path", ".");
        } catch (Exception ignored) {}

'@
          $patched = $patched -replace '(private static String list\(\) \{)', "`$1`n$snippet"
          Set-Content $file $patched -NoNewline
          Write-Host "Patched source (no fix, sys_paths cleared in list())."

      - name: Build patched jar (skip integration tests)
        run: mvn -B package -DskipTests

      - name: Set up JDK 8 Temurin
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin

      - name: Run 'list' with explicit java.library.path=jre\bin workaround
        shell: pwsh
        run: |
          $jar = Get-Item target\extract-tls-secrets-*.jar | Select-Object -First 1
          $jreBin = "$env:JAVA_HOME\jre\bin"
          Write-Host "Running with -Djava.library.path=$jreBin and sys_paths cleared in code."
          Write-Host "usr_paths = [jre\bin]; sys_paths = [.] → attach.dll found via usr_paths."
          $output = java "-Djava.library.path=$jreBin" -jar $jar.FullName list 2>&1 | Out-String
          Write-Host $output
          if ($output -match 'WindowsAttachProvider could not be instantiated') {
            Write-Error "FAIL: Workaround did not work — ServiceConfigurationError still present"
            exit 1
          }
          Write-Host "PASS: Workaround confirmed — explicit -Djava.library.path=jre\bin resolves the issue."
