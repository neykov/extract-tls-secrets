name: Verify Fix for Issue 7 - WindowsAttachProvider could not be instantiated

# Strategy: instead of manipulating PATH (unreliable across steps via GITHUB_ENV),
# we control the native library search by setting java.library.path and
# sun.boot.library.path to "." (current directory, which has no attach.dll).
# This forces System.loadLibrary("attach") to fail unless the code explicitly
# loads it another way — exactly what the fix in AttachHelper.tryLoadLibrary() does.

on:
  workflow_dispatch:
  push:
    branches:
      - claude/reproduce-issue-7-Qj92G

jobs:

  layout-probe:
    runs-on: windows-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin

      - name: Print JDK layout and library paths
        shell: pwsh
        run: |
          Write-Host "JAVA_HOME: $env:JAVA_HOME"
          Write-Host ""
          Write-Host "attach.dll locations:"
          Write-Host "  jre\bin\attach.dll : $(Test-Path "$env:JAVA_HOME\jre\bin\attach.dll")"
          Write-Host "  bin\attach.dll     : $(Test-Path "$env:JAVA_HOME\bin\attach.dll")"
          Write-Host ""
          Write-Host "JVM property settings (java.library.path and sun.boot.library.path):"
          java -XshowSettings:property -version 2>&1 | Select-String "library.path"

  verify-fix-windows-attach-dll:
    # Run with both java.library.path and sun.boot.library.path set to "."
    # so that System.loadLibrary("attach") cannot find attach.dll through the
    # normal search. The fix's tryLoadLibrary() uses an absolute JAVA_HOME path
    # and therefore works regardless. We should see "Loaded attach ..." in output.
    runs-on: windows-latest
    needs: layout-probe
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11 for build
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: temurin

      - name: Build (skip integration tests)
        run: mvn -B package -DskipTests

      - name: Set up JDK 8 Temurin for attach test
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin

      - name: Verify precondition — attach.dll in jre\bin, not in bin
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:JAVA_HOME\jre\bin\attach.dll")) {
            Write-Error "Precondition failed: attach.dll not at $env:JAVA_HOME\jre\bin\attach.dll"
            exit 1
          }
          if (Test-Path "$env:JAVA_HOME\bin\attach.dll") {
            Write-Error "Precondition failed: attach.dll present in bin\ — classic layout not present"
            exit 1
          }
          Write-Host "Precondition met: attach.dll exists only in jre\bin\"
          Write-Host "JAVA_HOME=$env:JAVA_HOME"

      - name: Run 'list' with library paths set to '.' (no attach.dll there)
        shell: pwsh
        run: |
          $jar = Get-Item target\extract-tls-secrets-*.jar | Select-Object -First 1
          Write-Host "Running jar with java.library.path=. and sun.boot.library.path=."
          Write-Host "This forces System.loadLibrary('attach') to fail, requiring the JAVA_HOME fallback."
          java "-Djava.library.path=." "-Dsun.boot.library.path=." -jar $jar.FullName list 2>&1 |
            Tee-Object -FilePath output.txt
          Write-Host "Exit code: $LASTEXITCODE"

      - name: Assert fix works — fallback fires, no ServiceConfigurationError
        shell: pwsh
        run: |
          $output = Get-Content output.txt -Raw
          Write-Host "--- captured output ---"
          Write-Host $output
          Write-Host "--- end ---"

          if ($output -match 'WindowsAttachProvider could not be instantiated') {
            Write-Error "FAIL: ServiceConfigurationError present — fix did not prevent issue #7"
            exit 1
          }
          if ($output -match 'Failed loading attach provider') {
            Write-Error "FAIL: Fix could not load attach.dll via JAVA_HOME fallback"
            exit 1
          }
          if ($output -notmatch 'Loaded attach') {
            Write-Error "FAIL: 'Loaded attach' not in output — fix fallback did not fire"
            exit 1
          }
          Write-Host "PASS: Fix activated — attach.dll loaded via JAVA_HOME/jre/bin fallback."
          Write-Host "      System.loadLibrary failed (java.library.path=. and sun.boot.library.path=.)"
          Write-Host "      but tryLoadLibrary() found it via JAVA_HOME."

      - name: Upload output for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fix-verified-output
          path: output.txt

  reproduce-without-fix:
    # Same library path isolation, but with loadAttachLibrary() guard removed from
    # source. Without the fix, VirtualMachine.list() → ServiceLoader →
    # WindowsAttachProvider static init → System.loadLibrary("attach") → fails →
    # ServiceConfigurationError.
    runs-on: windows-latest
    needs: verify-fix-windows-attach-dll
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11 for build
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: temurin

      - name: Revert loadAttachLibrary() call to simulate pre-fix code
        shell: pwsh
        run: |
          $file = "src\main\java\name\neykov\secrets\AttachHelper.java"
          $content = Get-Content $file -Raw
          # Remove the "if (isWindows()) { loadAttachLibrary(); }" block added by the fix.
          $patched = $content -replace '(?s)\s*if \(isWindows\(\)\) \{\s*loadAttachLibrary\(\);\s*\}', ''
          if ($patched -eq $content) {
            Write-Error "Regex did not match — loadAttachLibrary() guard not found in source"
            exit 1
          }
          Set-Content $file $patched -NoNewline
          Write-Host "Removed loadAttachLibrary() guard from AttachHelper.handle()"
          Write-Host ""
          Write-Host "Modified handle() method:"
          $handleStart = ($content -split '\n').indexof(($content -split '\n' | Select-String 'public static void handle'))
          Get-Content $file | Select-Object -First 15

      - name: Build unfixed jar (skip integration tests)
        run: mvn -B package -DskipTests

      - name: Set up JDK 8 Temurin for attach test
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin

      - name: Verify precondition — attach.dll in jre\bin, not in bin
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:JAVA_HOME\jre\bin\attach.dll")) {
            Write-Error "Precondition failed: attach.dll not at $env:JAVA_HOME\jre\bin\attach.dll"
            exit 1
          }
          if (Test-Path "$env:JAVA_HOME\bin\attach.dll") {
            Write-Error "Precondition failed: attach.dll present in bin\"
            exit 1
          }
          Write-Host "Precondition met."

      - name: Run unfixed 'list' with library paths set to '.'
        shell: pwsh
        run: |
          $jar = Get-Item target\extract-tls-secrets-*.jar | Select-Object -First 1
          Write-Host "Running UNFIXED jar with java.library.path=. and sun.boot.library.path=."
          java "-Djava.library.path=." "-Dsun.boot.library.path=." -jar $jar.FullName list 2>&1 |
            Tee-Object -FilePath output-unfixed.txt
          Write-Host "Exit code: $LASTEXITCODE"

      - name: Assert issue #7 is reproduced without the fix
        shell: pwsh
        run: |
          $output = Get-Content output-unfixed.txt -Raw
          Write-Host "--- captured output ---"
          Write-Host $output
          Write-Host "--- end ---"

          if ($output -match 'WindowsAttachProvider could not be instantiated') {
            Write-Host "PASS: Issue #7 reproduced — ServiceConfigurationError confirmed without the fix."
          } else {
            Write-Error "Expected ServiceConfigurationError was NOT produced. Output above."
            exit 1
          }

      - name: Upload output for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reproduce-unfixed-output
          path: output-unfixed.txt

  workaround-sanity-check:
    # Confirms the manual workaround from the issue: explicitly pointing
    # java.library.path at jre\bin resolves the failure.
    runs-on: windows-latest
    needs: reproduce-without-fix
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: temurin

      - name: Build
        run: mvn -B package -DskipTests

      - uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin

      - name: Run 'list' with java.library.path explicitly pointing to jre\bin
        shell: pwsh
        run: |
          $jar = Get-Item target\extract-tls-secrets-*.jar | Select-Object -First 1
          $jreBin = "$env:JAVA_HOME\jre\bin"
          Write-Host "Running with java.library.path=$jreBin and sun.boot.library.path=."
          $output = java "-Djava.library.path=$jreBin" "-Dsun.boot.library.path=." `
            -jar $jar.FullName list 2>&1 | Out-String
          Write-Host $output
          if ($output -match 'WindowsAttachProvider could not be instantiated') {
            Write-Error "FAIL: Workaround failed — ServiceConfigurationError still present"
            exit 1
          }
          Write-Host "PASS: Workaround confirmed — explicit java.library.path=jre\bin resolves the issue."
