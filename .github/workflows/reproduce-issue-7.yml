name: Verify Fix for Issue 7 - WindowsAttachProvider could not be instantiated

on:
  workflow_dispatch:
  push:
    branches:
      - claude/reproduce-issue-7-Qj92G

jobs:

  layout-probe:
    runs-on: windows-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin

      - name: Print JDK layout and library path
        shell: pwsh
        run: |
          Write-Host "JAVA_HOME: $env:JAVA_HOME"
          Write-Host ""
          Write-Host "attach.dll locations:"
          Write-Host "  jre\bin\attach.dll : $(Test-Path "$env:JAVA_HOME\jre\bin\attach.dll")"
          Write-Host "  bin\attach.dll     : $(Test-Path "$env:JAVA_HOME\bin\attach.dll")"
          Write-Host ""
          Write-Host "java.library.path:"
          java -XshowSettings:property -version 2>&1 | Select-String "library.path"
          Write-Host ""
          Write-Host "PATH entries:"
          ($env:PATH -split ';') | ForEach-Object { Write-Host "  $_" }

  verify-fix-windows-attach-dll:
    runs-on: windows-latest
    needs: layout-probe
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11 for build
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: temurin

      - name: Build (skip integration tests)
        run: mvn -B package -DskipTests

      - name: Set up JDK 8 Temurin for attach test
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin

      - name: Verify precondition — attach.dll in jre\bin, not in bin
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:JAVA_HOME\jre\bin\attach.dll")) {
            Write-Error "Precondition failed: attach.dll not at $env:JAVA_HOME\jre\bin\attach.dll — issue cannot be reproduced with this JDK distribution"
            exit 1
          }
          if (Test-Path "$env:JAVA_HOME\bin\attach.dll") {
            Write-Error "Precondition failed: attach.dll present in bin\ — issue will not reproduce"
            exit 1
          }
          Write-Host "Precondition met: attach.dll exists only in jre\bin\"

      - name: Strip jre\bin from PATH
        shell: pwsh
        run: |
          # Remove any *\jre\bin entries. The runner may have other pre-installed
          # JDKs whose jre\bin appears on PATH; strip all of them.
          $clean = ($env:PATH -split ';') |
            Where-Object { $_ -ne '' -and $_ -notlike '*\jre\bin' } |
            Select-Object -Unique
          $env:PATH = $clean -join ';'
          "PATH=$($env:PATH)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "PATH after stripping jre\bin:"
          $clean | ForEach-Object { Write-Host "  $_" }

      - name: Confirm jre\bin is absent from java.library.path
        shell: pwsh
        run: |
          $libPath = java -XshowSettings:property -version 2>&1 |
            Select-String "java.library.path" | Out-String
          Write-Host $libPath
          if ($libPath -match 'jre\\bin') {
            Write-Error "jre\bin is still in java.library.path — issue will not reproduce"
            exit 1
          }

      - name: Run 'list' and capture output
        shell: pwsh
        run: |
          $jar = Get-Item target\extract-tls-secrets-*.jar | Select-Object -First 1
          Write-Host "Running: java -jar $($jar.FullName) list"
          $output = java -jar $jar.FullName list 2>&1 | Out-String
          Write-Host "--- output ---"
          Write-Host $output
          Write-Host "--- end ---"
          $output | Out-File -FilePath output.txt

      - name: Assert fix works — fallback path taken, no ServiceConfigurationError
        shell: pwsh
        run: |
          $output = Get-Content output.txt -Raw
          # The fix in AttachHelper.tryLoadLibrary() should find attach.dll relative
          # to JAVA_HOME and print "Loaded attach <absolute-path>" before listing processes.
          if ($output -notmatch 'Loaded attach') {
            Write-Error "Fix did not activate — 'Loaded attach' not found in output. attach.dll fallback was not taken."
            exit 1
          }
          if ($output -match 'WindowsAttachProvider could not be instantiated') {
            Write-Error "ServiceConfigurationError still present — fix did not prevent the issue."
            exit 1
          }
          Write-Host "Fix verified: attach.dll loaded via JAVA_HOME fallback, no ServiceConfigurationError."

      - name: Upload output for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-7-output
          path: output.txt

  workaround-sanity-check:
    runs-on: windows-latest
    needs: verify-fix-windows-attach-dll
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: temurin

      - name: Build
        run: mvn -B package -DskipTests

      - uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin

      - name: Strip jre\bin from PATH
        shell: pwsh
        run: |
          $clean = ($env:PATH -split ';') |
            Where-Object { $_ -ne '' -and $_ -notlike '*\jre\bin' } |
            Select-Object -Unique
          "PATH=$($clean -join ';')" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run 'list' with java.library.path pointing to jre\bin
        shell: pwsh
        run: |
          $jar = Get-Item target\extract-tls-secrets-*.jar | Select-Object -First 1
          $jreBin = "$env:JAVA_HOME\jre\bin"
          $output = java "-Djava.library.path=$jreBin" -jar $jar.FullName list 2>&1 |
            Out-String
          Write-Host $output
          if ($output -match 'WindowsAttachProvider could not be instantiated') {
            Write-Error "Workaround failed — ServiceConfigurationError still present"
            exit 1
          }
          Write-Host "Workaround confirmed working."
