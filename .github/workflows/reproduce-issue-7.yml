name: Verify Fix for Issue 7 - WindowsAttachProvider could not be instantiated

# Root cause of issue #7:
#   When attach.dll is absent from every path that System.loadLibrary("attach")
#   searches (sun.boot.library.path and java.library.path), the first call to
#   VirtualMachine.list() causes WindowsAttachProvider's static initializer to
#   throw UnsatisfiedLinkError inside a ServiceLoader scan, which becomes:
#     java.util.ServiceConfigurationError:
#       Provider com.sun.tools.attach.WindowsAttachProvider could not be instantiated
#
# The fix (loadAttachLibrary() called before VirtualMachine.list()) proactively
# loads attach.dll, catching UnsatisfiedLinkError and falling back to
#   $JAVA_HOME/jre/bin/attach.dll
# so WindowsAttachProvider can initialise cleanly.
#
# Reproduction strategy:
#   actions/setup-java with package-type:jre returns the same cached JDK path on
#   Temurin 8 (no separate JRE package).  Instead we copy $JAVA_HOME\jre to a
#   temp directory and remove attach.dll from the copy.  Running java.exe from
#   that copy sets sun.boot.library.path to the copy's bin (no attach.dll).
#   JAVA_HOME still points to the original JDK so:
#     - tools.jar is found at $JAVA_HOME/lib/tools.jar
#     - the fix's fallback finds attach.dll at $JAVA_HOME/jre/bin/attach.dll

on:
  workflow_dispatch:
  push:
    branches:
      - claude/reproduce-issue-7-Qj92G

jobs:

  # ─── probe ──────────────────────────────────────────────────────────────────
  probe-environment:
    runs-on: windows-latest
    steps:
      - name: Set up JDK 8 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin

      - name: Print JDK layout and library paths
        shell: pwsh
        run: |
          Write-Host "JAVA_HOME: $env:JAVA_HOME"
          Write-Host ""
          Write-Host "attach.dll locations:"
          Write-Host "  jre\bin\attach.dll : $(Test-Path "$env:JAVA_HOME\jre\bin\attach.dll")"
          Write-Host "  bin\attach.dll     : $(Test-Path "$env:JAVA_HOME\bin\attach.dll")"
          Write-Host "  lib\tools.jar      : $(Test-Path "$env:JAVA_HOME\lib\tools.jar")"
          Write-Host ""
          Write-Host "JVM property settings:"
          java -XshowSettings:property -version 2>&1 | Select-String "library.path"

  # ─── reproduce-without-fix ──────────────────────────────────────────────────
  reproduce-without-fix:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin

      - name: Save JDK path
        shell: pwsh
        run: echo "JAVA_HOME_JDK=$env:JAVA_HOME" >> $env:GITHUB_ENV

      - name: Remove loadAttachLibrary() guard (simulate unfixed state)
        shell: pwsh
        run: |
          $file = "src\main\java\name\neykov\secrets\AttachHelper.java"
          $content = Get-Content $file -Raw
          $patched = $content -replace "(?s)\s*if \(isWindows\(\)\) \{\s*loadAttachLibrary\(\);\s*\}", ""
          if ($patched -eq $content) {
            Write-Error "Regex did not match — loadAttachLibrary() guard not found"
            exit 1
          }
          Set-Content $file $patched -NoNewline
          Write-Host "Patched: loadAttachLibrary() guard removed."

      - name: Build unfixed jar
        run: mvn -B package -DskipTests

      - name: Create JRE copy without attach.dll
        shell: pwsh
        run: |
          # Copy the JRE subtree so we get a working java.exe whose
          # sun.boot.library.path is the copy's bin directory (no attach.dll).
          # JAVA_HOME remains on the original JDK so tools.jar and the fix
          # fallback path ($JAVA_HOME/jre/bin/attach.dll) are both intact.
          $src = "$env:JAVA_HOME_JDK\jre"
          $dst = "$env:TEMP\jre-no-attach"
          Write-Host "Copying $src -> $dst ..."
          Copy-Item $src $dst -Recurse -Force
          Remove-Item "$dst\bin\attach.dll" -Force -ErrorAction Stop
          Write-Host "Copy complete. attach.dll removed."
          Write-Host "  dst\bin\attach.dll present: $(Test-Path "$dst\bin\attach.dll")"
          Write-Host "  src\bin\attach.dll present: $(Test-Path "$src\bin\attach.dll")"
          echo "JRE_NO_ATTACH=$dst" >> $env:GITHUB_ENV

      - name: Run unfixed jar with no-attach JRE java.exe
        shell: pwsh
        run: |
          # JAVA_HOME must point to JDK so AgentAttach can find tools.jar.
          # We run with the copied JRE's java.exe which has no attach.dll in
          # its sun.boot.library.path.
          $env:JAVA_HOME = $env:JAVA_HOME_JDK
          $jar = Get-Item target\extract-tls-secrets-*.jar | Select-Object -First 1
          Write-Host "java.exe : $env:JRE_NO_ATTACH\bin\java.exe"
          Write-Host "JAVA_HOME: $env:JAVA_HOME"
          & "$env:JRE_NO_ATTACH\bin\java.exe" -jar $jar.FullName list 2>&1 |
            Tee-Object -FilePath output-unfixed.txt
          Write-Host "Exit code: $LASTEXITCODE"

      - name: Assert issue #7 is reproduced
        shell: pwsh
        run: |
          $output = Get-Content output-unfixed.txt -Raw
          Write-Host "--- output ---"
          Write-Host $output
          Write-Host "--- end ---"
          if ($output -match "WindowsAttachProvider could not be instantiated") {
            Write-Host "PASS: Issue #7 reproduced — ServiceConfigurationError confirmed without the fix."
          } else {
            Write-Error "FAIL: Expected 'WindowsAttachProvider could not be instantiated' was NOT produced."
            exit 1
          }

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reproduce-unfixed-output
          path: output-unfixed.txt

  # ─── verify-fix ─────────────────────────────────────────────────────────────
  verify-fix:
    runs-on: windows-latest
    needs: reproduce-without-fix
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin

      - name: Save JDK path
        shell: pwsh
        run: echo "JAVA_HOME_JDK=$env:JAVA_HOME" >> $env:GITHUB_ENV

      - name: Build fixed jar (unmodified source)
        run: mvn -B package -DskipTests

      - name: Create JRE copy without attach.dll
        shell: pwsh
        run: |
          $src = "$env:JAVA_HOME_JDK\jre"
          $dst = "$env:TEMP\jre-no-attach"
          Write-Host "Copying $src -> $dst ..."
          Copy-Item $src $dst -Recurse -Force
          Remove-Item "$dst\bin\attach.dll" -Force -ErrorAction Stop
          Write-Host "Copy complete. attach.dll removed from copy."
          echo "JRE_NO_ATTACH=$dst" >> $env:GITHUB_ENV

      - name: Verify preconditions
        shell: pwsh
        run: |
          $jdkAttach = "$env:JAVA_HOME_JDK\jre\bin\attach.dll"
          $fakeAttach = "$env:JRE_NO_ATTACH\bin\attach.dll"
          if (-not (Test-Path $jdkAttach)) {
            Write-Error "Precondition FAILED: JDK has no attach.dll at $jdkAttach"
            exit 1
          }
          if (Test-Path $fakeAttach) {
            Write-Error "Precondition FAILED: attach.dll still present in copied JRE at $fakeAttach"
            exit 1
          }
          Write-Host "Preconditions OK:"
          Write-Host "  Original JDK has attach.dll : $jdkAttach"
          Write-Host "  Copied JRE has NO attach.dll"

      - name: Run fixed jar with no-attach JRE java.exe
        shell: pwsh
        run: |
          $env:JAVA_HOME = $env:JAVA_HOME_JDK
          $jar = Get-Item target\extract-tls-secrets-*.jar | Select-Object -First 1
          Write-Host "java.exe : $env:JRE_NO_ATTACH\bin\java.exe"
          Write-Host "JAVA_HOME: $env:JAVA_HOME"
          & "$env:JRE_NO_ATTACH\bin\java.exe" -jar $jar.FullName list 2>&1 |
            Tee-Object -FilePath output-fixed.txt
          Write-Host "Exit code: $LASTEXITCODE"

      - name: Assert fix works
        shell: pwsh
        run: |
          $output = Get-Content output-fixed.txt -Raw
          Write-Host "--- output ---"
          Write-Host $output
          Write-Host "--- end ---"

          if ($output -match "WindowsAttachProvider could not be instantiated") {
            Write-Error "FAIL: ServiceConfigurationError present — fix did not prevent issue #7"
            exit 1
          }
          if ($output -match "Failed loading attach provider") {
            Write-Error "FAIL: Fix could not find attach.dll via JAVA_HOME fallback"
            exit 1
          }
          if ($output -notmatch "Loaded attach") {
            Write-Error "FAIL: 'Loaded attach' not found — fix fallback did not fire or failed silently"
            exit 1
          }
          Write-Host "PASS: Fix worked — attach.dll loaded via JAVA_HOME/jre/bin fallback."

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fix-verified-output
          path: output-fixed.txt
